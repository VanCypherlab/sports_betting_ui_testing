[pytest]
pythonpath = .
testpaths = tests
# Default target is qat. To run against another environment (separate
# environment/database -- match/wager IDs are not interchangeable across
# environments), override on the command line, e.g.:
#   pytest --base-url=https://admin.uat.cypherlab.tech
#   pytest --base-url=https://bo-v2.dev.cypherlab.tech
addopts = --base-url=https://admin.qat.cypherlab.tech
# frontend-miniapp is a separate origin from backoffice-ui's --base-url
# above. tests/miniapp/* (and any test using requires_miniapp_base_url)
# skip entirely if this is blank.
# Default target is qat. To run against another environment, override on
# the command line, e.g.:
#   pytest -o miniapp_base_url=https://miniapp.uat.cypherlab.tech
#   pytest -o miniapp_base_url=https://miniapp.dev.cypherlab.tech
miniapp_base_url = https://miniapp.qat.cypherlab.tech
markers =
    slow: timing-sensitive tests (rate limiting, single-session TTL)
    miniapp: tests that target frontend-miniapp instead of backoffice-ui
